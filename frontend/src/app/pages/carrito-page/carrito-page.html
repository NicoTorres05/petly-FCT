<h2>Mi carrito</h2>

<div *ngIf="carrito && carrito.productos.length > 0; else noCarrito">
  <table>
    <tr>
      <th>Producto</th>
      <th>Cantidad</th>
      <th>Precio</th>
      <th></th>
    </tr>
    <tr *ngFor="let item of carrito.productos">
      <td>{{ productos[item.productoId]?.nombre}}</td>
      <td>{{ item.cantidad }}</td>
      <td>{{ item.precio }} €</td>
      <td>
        <button (click)="agregarProducto(item.productoId)">+</button>
        <button (click)="eliminarUno(item.productoId)">-</button>
      </td>
    </tr>
  </table>
  <h3>Total: {{ carrito.precioTotal}} €</h3>
  <button (click)="comprar()">Finalizar compra</button>
</div>

<ng-template #noCarrito>
  <h3>No tienes productos en el carrito.</h3>
  <a href="productos" class="btn btn-outline-primary mt-3">Explora los productos disponibles</a>
</ng-template>
