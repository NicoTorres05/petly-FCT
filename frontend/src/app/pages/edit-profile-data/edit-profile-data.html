<div class="editar-perfil">

  <h2>Editar Perfil</h2>

  <form [formGroup]="perfilForm" (ngSubmit)="submit()">


    <div class="pfp-section">
      <div>
        <div *ngIf="previewUrl || (usuario?.pfp && usuario.pfp !== '' && usuario.pfp !== 'null'); else noPfp">
          <img class="pfp-preview"
               [src]="previewUrl || ('http://localhost:8080' + usuario?.pfp)"
               alt="Foto de perfil" />
        </div>
        <div>
          <ng-template #noPfp>
            <img class="pfp-preview" src="assets/icons/pfp_placeholder.png">
          </ng-template>
        </div>


        <label class="btn-file">
          Cambiar foto
          <input type="file" accept="image/*" (change)="onFileSelected($event)">
        </label>
        <label class="btn-file btn-delete" (click)="eliminarFoto()">
          Eliminar foto
        </label>
      </div>
    </div>




    <!-- NOMBRE -->
    <div class="field">
      <label for="nombre">Nombre</label>
      <input id="nombre" formControlName="nombre" type="text">
      <div class="error" *ngIf="perfilForm.get('nombre')?.touched && perfilForm.get('nombre')?.invalid">
        El nombre es obligatorio.
      </div>
    </div>

    <!-- CONTRASEÑA -->
    <div class="field">
      <label for="contrasena">Contraseña</label>
      <input id="contrasena" formControlName="contrasena" type="password">
    </div>

    <!-- EMAIL -->
    <div class="field">
      <label for="email">Email</label>
      <input id="email" formControlName="email" type="email">
      <div class="error" *ngIf="perfilForm.get('email')?.touched && perfilForm.get('email')?.invalid">
        Email inválido.
      </div>
    </div>

    <!-- DIRECCIÓN -->
    <div class="field">
      <label for="direccion">Dirección</label>
      <input id="direccion" formControlName="direccion" type="text">
    </div>

    <!-- TELÉFONO -->
    <div class="field">
      <label for="telefono">Teléfono</label>
      <input id="telefono" formControlName="telefono" type="text">
    </div>

    <!-- ROL -->
    <div class="field">
      <label for="tipo">Rol</label>
      <select id="tipo" formControlName="tipo">
        <option value="NORMAL">Normal</option>
        <option value="ADMIN">Administrador</option>
      </select>
    </div>

    <!-- SALDO -->
    <div class="field">
      <label for="saldo">Saldo</label>
      <input id="saldo" formControlName="saldo" type="number" min="0">
    </div>

    <!-- BOTÓN GUARDAR -->
    <button class="btn-guardar" type="submit">Guardar cambios</button>

  </form>
</div>
